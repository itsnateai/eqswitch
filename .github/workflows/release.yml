name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (supply-chain-pin 2026-05-27)

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0 (supply-chain-pin 2026-05-27)
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        run: |
          $csproj = Get-Content EQSwitch.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>"
          Set-Content EQSwitch.csproj $csproj

      # Gate: tracked Native/*.dll must not be older (in git history) than any of
      # its sources. release.yml ships pre-built DLLs via `cp` rather than rebuilding
      # C++ on tag, so a source-only commit (e.g. c479de1) can otherwise sneak through
      # and ship the previous release's DLL with a new version sticker.
      - name: Native DLL currency check
        shell: bash
        run: bash .github/scripts/check-native-dll-currency.sh

      - name: Build self-contained
        run: dotnet publish EQSwitch.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true

      - name: Prepare assets
        shell: bash
        run: |
          cp bin/Release/net8.0-windows/win-x64/publish/EQSwitch.exe EQSwitch.exe
          cp Native/eqswitch-hook.dll eqswitch-hook.dll
          cp Native/eqswitch-di8.dll eqswitch-di8.dll

      - name: Create zip bundle
        shell: pwsh
        run: |
          # Build the versioned zip once, then copy it byte-for-byte to the
          # canonical version-independent name. Identical bytes -> identical
          # SHA256, so SHA256SUMS lists one digest under two names: one artifact,
          # two asset names. The versioned name keeps pre-transition clients
          # self-updating; the canonical name gives manual users a stable download
          # + a consistent "EQSwitch" extract folder. (-Force lets a local re-run
          # rebuild over an existing zip; a fresh CI runner has none.)
          #
          # PHASE-2 GUARD — do NOT drop the versioned EQSwitch-X.Y.Z.zip (here, in
          # SHA256SUMS, in the upload list, or in PRIMARY_ASSET) until the install
          # base is past the last pre-canonical version (v3.24.17). Clients <=3.24.17
          # only recognize the hyphenated name; a canonical-only release would strand
          # them at "No update package found." See memory:
          # reference_self_update_versionless_asset_dual_rollout.
          $versioned = "EQSwitch-${{ steps.version.outputs.VERSION }}.zip"
          Compress-Archive -Path EQSwitch.exe, eqswitch-hook.dll, eqswitch-di8.dll, LICENSE, README.md, CHANGELOG.md -DestinationPath $versioned -Force
          Copy-Item $versioned "EQSwitch.zip" -Force

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          # One line per asset name (same digest — they're byte-identical). Old
          # clients look up the versioned line; v3.24.18+ clients look up
          # EQSwitch.zip. The consumer pins to the exact name it downloaded, so
          # the sibling line can't shadow. set -e: a sha256sum failure on either
          # file aborts the build instead of uploading a truncated manifest (a
          # missing line would make the consumer fail-closed on a real release).
          sha256sum "EQSwitch-${{ steps.version.outputs.VERSION }}.zip" "EQSwitch.zip" > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0 (supply-chain-pin 2026-05-27)
        with:
          generate_release_notes: true
          files: |
            EQSwitch-${{ steps.version.outputs.VERSION }}.zip
            EQSwitch.zip
            SHA256SUMS

      # Post-publish verification — softprops/action-gh-release reports
      # "Uploaded ..." on push but only guarantees the upload-API call
      # returned 2xx. The step below fetches the release back and asserts
      # all expected assets (both zip names + SHA256SUMS) are present,
      # state=uploaded, and the release is not a draft. SCOPE: catches
      # CI-window failure modes (action bug,
      # eventual-consistency hiccup, concurrent re-run race, edits during
      # the ~25s retry window). It does NOT catch a human clobbering assets
      # via `gh release upload --clobber` or the web UI 30s / 30 days later
      # — that's out of scope here. RETRY_MAX × RETRY_SLEEP is the total
      # wait budget for GH's asset-list eventual consistency (default 5×5s
      # = 25s); bump if a repo regularly exceeds that propagation.
      - name: Verify both assets persisted on the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          PRIMARY_ASSET: EQSwitch-${{ steps.version.outputs.VERSION }}.zip
          SECONDARY_ASSET: EQSwitch.zip
          RETRY_MAX: '5'
          RETRY_SLEEP: '5'
        run: |
          set -euo pipefail
          attempt=0
          JSON=''
          PRI_STATE=''
          SEC_STATE=''
          SUM_STATE=''
          IS_DRAFT=''
          while [ "$attempt" -lt "$RETRY_MAX" ]; do
            attempt=$((attempt+1))
            # Non-fatal gh api so a transient 5xx / rate-limit doesn't kill
            # the loop before the retry budget is consumed. stderr is folded
            # into the buffer so the error body lands in $JSON for the final
            # diagnostics dump (no separate reset path).
            if ! JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>&1); then
              echo "Attempt ${attempt}/${RETRY_MAX}: gh api non-zero — keeping response body for diagnostics. Head: ${JSON:0:200}"
            fi
            PRI_STATE=$(printf '%s' "$JSON" | jq -r --arg n "$PRIMARY_ASSET" '.assets[]? | select(.name==$n) | .state' 2>/dev/null || true)
            SEC_STATE=$(printf '%s' "$JSON" | jq -r --arg n "$SECONDARY_ASSET" '.assets[]? | select(.name==$n) | .state' 2>/dev/null || true)
            SUM_STATE=$(printf '%s' "$JSON" | jq -r '.assets[]? | select(.name=="SHA256SUMS") | .state' 2>/dev/null || true)
            IS_DRAFT=$(printf '%s' "$JSON" | jq -r '.draft // empty' 2>/dev/null || true)
            if [ "$PRI_STATE" = "uploaded" ] && [ "$SEC_STATE" = "uploaded" ] && [ "$SUM_STATE" = "uploaded" ] && [ "$IS_DRAFT" != "true" ]; then
              echo "::notice::Release ${TAG} verified: ${PRIMARY_ASSET} + ${SECONDARY_ASSET} + SHA256SUMS all present, not draft"
              exit 0
            fi
            echo "Attempt ${attempt}/${RETRY_MAX}: primary=${PRI_STATE:-MISSING} secondary=${SEC_STATE:-MISSING} sum=${SUM_STATE:-MISSING} draft=${IS_DRAFT:-?}"
            if [ "$attempt" -lt "$RETRY_MAX" ]; then
              sleep "$RETRY_SLEEP"
            fi
          done
          echo "::error::Release ${TAG} not verified after ${RETRY_MAX} attempts. primary=${PRI_STATE:-MISSING} secondary=${SEC_STATE:-MISSING} sum=${SUM_STATE:-MISSING} draft=${IS_DRAFT:-?}"
          echo "--- Last API response or error body (first 2000 chars) ---"
          printf '%s\n' "${JSON:0:2000}"
          exit 1
