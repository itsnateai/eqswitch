name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        run: |
          $csproj = Get-Content EQSwitch.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>"
          Set-Content EQSwitch.csproj $csproj

      - name: Build self-contained
        run: dotnet publish EQSwitch.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true

      - name: Build framework-dependent
        run: dotnet publish EQSwitch.csproj -c Release --no-self-contained -p:PublishSingleFile=false

      - name: Prepare assets
        shell: bash
        run: |
          cp bin/Release/net8.0-windows/win-x64/publish/EQSwitch.exe EQSwitch.exe
          cp bin/Release/net8.0-windows/EQSwitch.exe EQSwitch-fd.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            EQSwitch.exe
            EQSwitch-fd.exe
