<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a2a"/>
      <stop offset="100%" stop-color="#1a2520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34c060"/>
      <stop offset="100%" stop-color="#1a8040"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50e878"/>
      <stop offset="100%" stop-color="#30b455"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)" stroke="url(#glow)" stroke-width="4"/>

  <!-- 2x2 grid of "windows" representing multiboxing -->
  <!-- Top-left (active window — brighter) -->
  <rect x="36" y="36" width="84" height="72" rx="6" ry="6" fill="url(#active)" opacity="0.95"/>
  <rect x="36" y="36" width="84" height="14" rx="6" ry="6" fill="#40d068"/>
  <rect x="36" y="46" width="84" height="4" fill="#40d068"/>

  <!-- Top-right -->
  <rect x="136" y="36" width="84" height="72" rx="6" ry="6" fill="url(#glow)" opacity="0.5"/>
  <rect x="136" y="36" width="84" height="14" rx="6" ry="6" fill="#2a8848" opacity="0.7"/>
  <rect x="136" y="46" width="84" height="4" fill="#2a8848" opacity="0.7"/>

  <!-- Bottom-left -->
  <rect x="36" y="124" width="84" height="72" rx="6" ry="6" fill="url(#glow)" opacity="0.5"/>
  <rect x="36" y="124" width="84" height="14" rx="6" ry="6" fill="#2a8848" opacity="0.7"/>
  <rect x="36" y="134" width="84" height="4" fill="#2a8848" opacity="0.7"/>

  <!-- Bottom-right -->
  <rect x="136" y="124" width="84" height="72" rx="6" ry="6" fill="url(#glow)" opacity="0.5"/>
  <rect x="136" y="124" width="84" height="14" rx="6" ry="6" fill="#2a8848" opacity="0.7"/>
  <rect x="136" y="134" width="84" height="4" fill="#2a8848" opacity="0.7"/>

  <!-- Swap arrow (circular) in the center gap -->
  <g transform="translate(128, 118)" fill="none" stroke="#50e878" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Circular arrow path -->
    <path d="M-10,-8 A12,12 0 0,1 10,-2"/>
    <path d="M10,-2 L6,-6 10,-2 14,-5"/>
    <path d="M10,8 A12,12 0 0,1 -10,2"/>
    <path d="M-10,2 L-14,5 -10,2 -6,6"/>
  </g>

  <!-- "EQ" text at bottom -->
  <text x="128" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#50e878" opacity="0.8">EQ</text>
</svg>
